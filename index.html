<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architect Builder</title>
    <!--
      NOTE: Google Fonts are intentionally removed here.
      Figma plugin UIs run in a sandboxed iframe where external network requests
      are blocked (manifest.json has networkAccess.allowedDomains: none).
      Inter is loaded via system font stack or bundled CSS fallback instead.
    -->
    <style>
      /* Inline Inter-like system font stack for Figma plugin compatibility */
      :root {
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          sans-serif;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
